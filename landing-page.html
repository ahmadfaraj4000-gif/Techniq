<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Techniq Skin & Beauty | Links</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: #2f2f2f;

  /* SAME GRADIENT STYLE AS YOUR SITE */
  background:
    radial-gradient(1200px 600px at 10% 0%, rgba(188,192,214,.4), transparent 60%),
    radial-gradient(900px 600px at 90% 10%, rgba(235,187,168,.3), transparent 55%),
    radial-gradient(800px 500px at 50% 100%, rgba(200,225,207,.25), transparent 55%),
    #fff;

  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CONTAINER */
.linktree {
  width: 100%;
  max-width: 420px;
  padding: 30px 20px;
  text-align: center;
}

/* LOGO */
.logo-wrap {
  margin-bottom: 25px;
}

.logo-wrap img {
  width: 140px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* TITLE */
h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 500;
  font-size: 1.8rem;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 14px;
  color: #666;
  margin-bottom: 28px;
}

/* BUTTONS */
.link-btn {
  display: block;
  width: 100%;
  padding: 16px;
  margin-bottom: 14px;
  border-radius: 30px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  transition: all 0.25s ease;
}

/* PRIMARY BUTTON (peach) */
.primary {
  background: #EBBBA8;
  color: #2f2f2f;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}

.primary:hover {
  background: #DFAE9A;
  transform: translateY(-2px);
}

/* SECONDARY BUTTON (mint) */
.secondary {
  background: #C8E1CF;
  color: #2f2f2f;
}

.secondary:hover {
  background: #BDC6D7;
  transform: translateY(-2px);
}

/* OUTLINE BUTTON */
.outline {
  background: rgba(255,255,255,0.8);
  border: 1px solid rgba(0,0,0,0.08);
}

.outline:hover {
  background: white;
  transform: translateY(-2px);
}

/* FOOTER */
.footer {
  margin-top: 25px;
  font-size: 12px;
  color: #999;
}
</style>
</head>

<body>

<div class="linktree">

  <!-- LOGO -->
  <div class="logo-wrap">
    <img src="images/techniq-of.png" alt="Techniq Skin & Beauty">
  </div>

  <!-- BRAND -->
  <h1>Techniq Skin & Beauty</h1>
  <div class="subtitle">Vernon, CT · Licensed Esthetician</div>

  <!-- LINKS -->
  <a href="index.html" class="link-btn primary">
    Visit Website
  </a>

  <a href="https://book.squareup.com/appointments/akl2v1sa6lvvyg/location/LPYHQ6EDHX53D/services"
     target="_blank"
     class="link-btn secondary">
    Book Appointment
  </a>

  <a href="products.html" class="link-btn primary">
    Shop Products
  </a>

  <!-- EASY TO ADD MORE -->
  <!--
  <a href="your-link-here" class="link-btn outline">
    New Link
  </a>
  -->

  <div class="footer">
    Powered by RE IMAGE BUSINESS SOLUTIONS
  </div>

</div>

</body>
</html>
